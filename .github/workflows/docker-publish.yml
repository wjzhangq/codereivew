name: Build and Push Docker Images

on:
  push:
    tags: [ "v*.*.*" ]
  workflow_dispatch:
    inputs:
      version:
        description: "镜像版本号 (例如 1.0.0，不要带 v 前缀)"
        required: true
        type: string

env:
  # 镜像名前缀使用 Docker Hub 用户名，三个镜像分别为:
  #   <user>/codereview-api  <user>/codereview-worker  <user>/codereview-web
  IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}/codereview

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: backend/Dockerfile
            target: api
          - name: worker
            dockerfile: backend/Dockerfile
            target: worker
          - name: web
            dockerfile: frontend/Dockerfile
            target: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
